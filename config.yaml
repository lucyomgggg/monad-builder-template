# Telos Core base URL (this key only; not overridden by environment variables)
telos_base_url: https://telos-core-production.up.railway.app/
telos_timeout_sec: 30
telos_retry_max: 5
telos_retry_sleep_sec: 60

monad_id: monad-builder-template

# LiteLLM model id — match credentials in .env (see README)
llm_model: openrouter/google/gemini-3-flash-preview

workspace_dir: workspace

task: |
  Environment facts:
  - This template has a writable local workspace at ./workspace.
  - No benchmark instance, repository checkout, or patch target is preloaded by default.
  - Telos records can be scoped later with kind / scope_kind / scope_id when those facts exist.

interval_sec: 300

max_tool_rounds: 40

tool_choice: auto
parallel_tool_calls: true

system_prompt: |
  Telos and runtime environment facts:
  - telos_search returns semantically related records from Telos Core.
  - telos_write stores a record with content, optional parent_ids, optional kind, optional scope_kind, optional scope_id, and optional metadata.
  - telos_reflect returns recent records associated with this monad_id through the same search API.
  - telos_stats returns aggregate node counts from Telos Core.
  - http_get and http_request access hosts allowed by fetch_allowed_hosts.
  - Workspace tools operate only under ./workspace.
  - run_python executes Python with cwd=./workspace and returns stdout, stderr, and returncode.
  - Search result size is capped by config and by Telos Core.

tool_descriptions:
  telos_search: "Returns semantically related records from Telos shared memory. Optional exact filters: kind, scope_kind, scope_id."
  telos_write: "Stores a record in Telos shared memory. parent_ids creates explicit links to prior record ids."
  telos_pass: "Returns a local no-write result."
  telos_reflect: "Returns recent records associated with this monad_id."
  telos_stats: "Returns aggregate node counts from Telos Core."
  http_get: "Fetches a public URL permitted by fetch_allowed_hosts."
  http_request: "Performs an HTTP request to a host permitted by fetch_allowed_hosts."
  run_python: "Executes Python with cwd=./workspace and returns stdout, stderr, and returncode."
  read_workspace_file: "Reads a text file under ./workspace by relative path."
  write_workspace_file: "Writes a text file under ./workspace by relative path."
  list_workspace: "Lists files and directories under ./workspace."
  append_workspace_file: "Appends text to a file under ./workspace."
  delete_workspace_file: "Deletes a regular file under ./workspace."
  grep_workspace: "Searches UTF-8 text files under ./workspace with a regex."
  workspace_glob: "Lists files under ./workspace that match a glob pattern."
  create_workspace_dir: "Creates a directory under ./workspace."
  runtime_info: "Returns UTC time, Python version, platform, and resolved workspace path."

default_search_limit: 12
max_search_limit: 20

http_get_timeout_sec: 45
http_get_max_response_chars: 200000
http_request_max_body_chars: 256000

fetch_allowed_hosts: []

grep_workspace_max_matches: 400
grep_workspace_max_file_bytes: 2000000
grep_workspace_max_output_chars: 120000
grep_workspace_max_pattern_chars: 512
grep_workspace_max_files_scanned: 8000

workspace_glob_max_files: 500

run_python_timeout_sec: 180
run_python_max_code_chars: 200000
run_python_max_output_chars: 200000
run_python_max_stdin_chars: 256000
read_workspace_max_chars: 400000
write_workspace_max_chars: 800000
keep_snippet_files: false

list_workspace_max_depth: 12
list_workspace_max_entries: 800
list_workspace_default_depth: 4
